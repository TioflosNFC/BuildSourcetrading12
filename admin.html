<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Build Source</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="main.css">
</head>
<body>

<header class="site-header">
  <div class="container nav-row">
    <a href="index.html" class="brand">
      <img src="logo.png" alt="Build Source logo">
      <span class="brand-text">Build Source<small>Admin</small></span>
    </a>
    <div class="nav-actions">
      <button class="btn btn-secondary" data-logout style="display:none;" data-admin-pane>Sign out</button>
      <a href="index.html" class="btn btn-secondary">← Back to site</a>
    </div>
  </div>
</header>

<main>

  <!-- LOGIN -->
  <div class="admin-login-wrap" data-login-pane>
    <div class="admin-login-card">
      <h2>Admin sign in</h2>
      <p>Sign in to manage products and gallery projects.</p>
      <p class="login-error" data-login-error></p>
      <form data-login-form>
        <div class="form-field">
          <label for="admin-email">Email</label>
          <input type="email" id="admin-email" name="email" required autocomplete="username">
        </div>
        <div class="form-field">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Sign in</button>
      </form>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="admin-shell" data-admin-pane style="display:none;">
    <div class="container">
      <div class="admin-topbar">
        <div class="admin-tabs">
          <button class="admin-tab is-active-tab" data-admin-tab="products">Products</button>
          <button class="admin-tab" data-admin-tab="projects">Gallery Projects</button>
        </div>
      </div>

      <!-- PRODUCTS PANEL -->
      <section data-admin-panel="products">
        <div class="admin-panel-head">
          <h3 style="font-size: var(--step-1); color: var(--bs-blue-deep);">Products</h3>
          <button class="btn btn-primary btn-sm" data-add-new="products">+ Add new product</button>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Actions</th></tr></thead>
            <tbody data-admin-list="products"></tbody>
          </table>
        </div>
      </section>

      <!-- PROJECTS PANEL -->
      <section data-admin-panel="projects" style="display:none;">
        <div class="admin-panel-head">
          <h3 style="font-size: var(--step-1); color: var(--bs-blue-deep);">Gallery Projects</h3>
          <button class="btn btn-primary btn-sm" data-add-new="projects">+ Add new project</button>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr><th>Image</th><th>Title</th><th>Category</th><th>Note</th><th>Actions</th></tr></thead>
            <tbody data-admin-list="projects"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

</main>

<!-- ADD/EDIT MODAL -->
<div class="admin-modal-overlay" data-admin-modal>
  <div class="admin-modal">
    <div class="admin-modal-head">
      <h3 data-modal-title>Add entry</h3>
      <button class="modal-close-btn" data-modal-close aria-label="Close">&times;</button>
    </div>
    <form data-modal-form>
      <img class="image-preview" data-image-preview alt="Preview">
      <div class="form-field">
        <label>Image</label>
        <input type="file" name="image_file" accept="image/*">
        <p class="form-note">Uploads to Supabase Storage. Leave empty to keep the current image when editing.</p>
      </div>
      <div data-modal-fields><!-- dynamic fields injected by admin.js --></div>
      <p class="modal-error" data-modal-error></p>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" data-modal-close>Cancel</button>
        <button type="submit" class="btn btn-primary" data-modal-save>Save</button>
      </div>
    </form>
  </div>
</div>

<script src="main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script src="admin.js"></script>
</body>
</html>
